<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <title>Śpiewnik Turystyczny</title>

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a140e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Śpiewnik">

    <style>
        :root {
            --bg: #101114;
            --panel: #191b20;
            --panel-2: #20232a;
            --text: #f2f2f0;
            --muted: #a7adb8;
            --border: #323741;
            --accent: #e24b4b;
            --hover: #292d35;
            --shadow: rgba(0, 0, 0, 0.28);
            --app-height: 100vh;
            --song-font-size: 1rem;
            --chord-font-size: 1.28rem;
        }

        @supports (height: 100dvh) {
            :root {
                --app-height: 100dvh;
            }
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html { height: 100%; }

        body {
            margin: 0;
            height: var(--app-height);
            min-height: var(--app-height);
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        button, input { font: inherit; }
        button { cursor: pointer; }

        .app {
            display: flex;
            flex-direction: row;
            height: 100%;
            width: 100%;
        }

        .sidebar {
            order: 2;
            width: 330px;
            background: var(--panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: margin-right 0.3s ease, transform 0.3s ease;
            z-index: 5;
        }

        body.sidebar-hidden .sidebar {
            margin-right: -330px;
            transform: translateX(100%);
        }

        .sidebar-header {
            min-height: 44px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            border-bottom: 1px solid var(--border);
            background: var(--panel);
        }

        .sidebar-title {
            font-weight: 800;
            color: var(--accent);
        }

        .icon-button, .small-button, .tag-button, .song-link {
            border: 1px solid var(--border);
            background: var(--panel-2);
            color: var(--text);
            border-radius: 7px;
            transition: all 0.15s ease;
        }

        .icon-button {
            width: 32px; height: 32px;
            display: inline-grid; place-items: center;
        }

        .icon-button:hover, .small-button:hover, .tag-button:hover, .song-link:hover {
            background: var(--hover);
            border-color: var(--accent);
        }

        .search-wrap {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border);
            background: var(--panel);
        }

        .search-wrap input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 10px;
            background: var(--bg);
            color: var(--text);
            outline: none;
        }

        .search-wrap input:focus { border-color: var(--accent); }

        .side-section {
            padding: 12px 10px 0;
            display: flex;
            flex-direction: column;
        }

        .side-section-title {
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .quick-list {
            display: grid;
            gap: 5px;
        }

        #search-results-section, #default-sections {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        .song-link {
            display: block;
            padding: 8px 10px;
            color: var(--text);
            text-decoration: none;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-link.active {
            background: color-mix(in srgb, var(--accent) 15%, var(--panel-2));
            border-color: var(--accent);
        }

        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag-button {
            padding: 5px 10px;
            font-size: 0.8rem;
        }

        .main {
            order: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            min-height: 46px;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 7px 9px;
            border-bottom: 1px solid var(--border);
            background: var(--panel);
            flex-wrap: wrap;
        }

        .topbar-group { display: flex; align-items: center; gap: 5px; }
        .brand { color: var(--accent); font-weight: 800; margin-right: 5px; }
        .topbar-divider { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }
        .small-button { padding: 4px 10px; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 5px; }
        .meter { padding: 4px 8px; border-radius: 7px; background: var(--bg); border: 1px solid var(--border); color: var(--accent); font-weight: 800; font-size: 0.85rem; }

        .active-toggle {
            background: color-mix(in srgb, var(--accent) 18%, var(--panel-2));
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-icon { display: none; }
        .btn-label { display: inline; }

        @media (max-width: 780px) {
            .topbar {
                gap: 3px;
                padding: 6px 6px;
            }
            .topbar-group { gap: 3px; }
            .topbar-divider { margin: 0 2px; }
            .brand { display: none; }
            .small-button {
                padding: 5px 7px;
                font-size: 0.95rem;
                min-width: 30px;
                justify-content: center;
            }
            .btn-icon { display: inline; }
            .btn-label { display: none; }
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px clamp(15px, 3vw, 30px);
            scroll-behavior: auto; /* Wyłączone płynne przewijanie CSS dla lepszego autoscrollu */
        }

        .song-screen { max-width: 900px; margin: 0 auto; }
        .song-head { padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 15px; }

        .song-title-row {
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: clamp(1.5rem, 3vw, 2.2rem);
            line-height: 1.1;
            flex: 1 1 auto;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .qr-box {
            flex: 0 0 auto;
            position: relative;
            padding: 6px;
            background: #fff;
            border-radius: 7px;
            border: 1px solid var(--border);
            line-height: 0;
        }

        .qr-box img {
            display: block;
            width: 132px;
            height: 132px;
        }

        .qr-close {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 26px;
            height: 26px;
            background: var(--panel-2);
            color: var(--text);
            font-size: 0.8rem;
        }

        @media (max-width: 560px) {
            .qr-box img { width: 96px; height: 96px; }
        }
        
        .tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .tags .tag-button { border-color: rgba(226, 75, 75, 0.4); color: var(--accent); border-radius: 15px; }

        .rating-badge {
            display: inline-block;
            cursor: help;
            border-bottom: 1px dotted var(--muted);
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .song-body { font-size: var(--song-font-size); line-height: 1.3; }
        
        .song-line { 
            display: flex; 
            flex-direction: row;
            flex-wrap: wrap;
            width: 100%;
            align-items: baseline;
            column-gap: 16px;
            row-gap: 2px;
            padding: 4px 0; 
            border-bottom: 1px solid color-mix(in srgb, var(--border) 20%, transparent); 
        }
        
        .chords { 
            color: var(--accent); 
            font-family: monospace; 
            font-size: var(--chord-font-size); 
            font-weight: 800; 
            line-height: 1.15;
            white-space: nowrap;
            flex: 0 0 auto;
            order: 2;
        }
        .lyric { 
            color: var(--text); 
            white-space: pre-wrap; 
            word-break: break-word;
            min-height: 1.2em; 
            flex: 0 1 auto;
            order: 1;
        }

        /* Tryb "akordy nad tekstem" — włączany przyciskiem w topbarze */
        body.chords-above .song-line {
            flex-direction: column;
            flex-wrap: nowrap;
            align-items: stretch;
            row-gap: 0;
            column-gap: 0;
            padding: 3px 0;
        }
        body.chords-above .chords {
            order: 0;
            white-space: normal;
            flex: 1 1 auto;
        }
        body.chords-above .lyric {
            order: 1;
            margin-top: 1px;
            flex: 1 1 auto;
        }

        .empty { color: var(--muted); font-size: 0.9rem; font-style: italic; }
        .hidden { display: none !important; }

        .song-nav {
            display: flex;
            gap: 10px;
            margin-top: 22px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .song-nav-link {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 9px;
            background: var(--panel-2);
            color: var(--text);
            text-decoration: none;
            min-width: 0;
            transition: all 0.15s ease;
        }

        .song-nav-link:hover { background: var(--hover); border-color: var(--accent); }

        .song-nav-next { text-align: right; align-items: flex-end; }

        .song-nav-label {
            color: var(--muted);
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .song-nav-title {
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        @media (max-width: 780px) {
            .sidebar {
                position: absolute;
                right: 0; top: 0; bottom: 0;
                width: 85vw;
                box-shadow: -5px 0 20px var(--shadow);
            }
        }
    </style>
    <script>
//---------------------------------------------------------------------
//
// QR Code Generator for JavaScript
//
// Copyright (c) 2009 Kazuhiko Arase
//
// URL: http://www.d-project.com/

// DENSO WAVE INCORPORATED
//  http://www.denso-wave.com/qrcode/faqpatent-e.html

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {

      mode = mode || 'Byte';

      var newData = null;

      switch(mode) {
      case 'Numeric' :
        newData = qrNumber(data);
        break;
      case 'Alphanumeric' :
        newData = qrAlphaNum(data);
        break;
      case 'Byte' :
        newData = qr8BitByte(data);
        break;
      case 'Kanji' :
        newData = qrKanji(data);
        break;
      default :
        throw 'mode:' + mode;
      }

      _dataList.push(newData);
      _dataCache = null;
    };

    _this.isDark = function(row, col) {
      if (row < 0 || _moduleCount <= row || col < 0 || _moduleCount <= col) {
        throw row + ',' + col;
      }
      return _modules[row][col];
    };

    _this.getModuleCount = function() {
      return _moduleCount;
    };

    _this.make = function() {
      if (_typeNumber < 1) {
        var typeNumber = 1;

        for (; typeNumber < 40; typeNumber++) {
          var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, _errorCorrectionLevel);
          var buffer = qrBitBuffer();

          for (var i = 0; i < _dataList.length; i++) {
            var data = _dataList[i];
            buffer.put(data.getMode(), 4);
            buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
            data.write(buffer);
          }

          var totalDataCount = 0;
          for (var i = 0; i < rsBlocks.length; i++) {
            totalDataCount += rsBlocks[i].dataCount;
          }

          if (buffer.getLengthInBits() <= totalDataCount * 8) {
            break;
          }
        }

        _typeNumber = typeNumber;
      }

      makeImpl(false, getBestMaskPattern() );
    };

    _this.createTableTag = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var qrHtml = '';

      qrHtml += '<table style="';
      qrHtml += ' border-width: 0px; border-style: none;';
      qrHtml += ' border-collapse: collapse;';
      qrHtml += ' padding: 0px; margin: ' + margin + 'px;';
      qrHtml += '">';
      qrHtml += '<tbody>';

      for (var r = 0; r < _this.getModuleCount(); r += 1) {

        qrHtml += '<tr>';

        for (var c = 0; c < _this.getModuleCount(); c += 1) {

            | (str.charCodeAt(i) & 0x3ff));
          utf8.push(0xf0 | (charcode >>18),
              0x80 | ((charcode>>12) & 0x3f),
              0x80 | ((charcode>>6) & 0x3f),
              0x80 | (charcode & 0x3f));
        }
      }
      return utf8;
    }
    return toUTF8Array(s);
  };

}();
    </script>
</head>

    <script>
        const polishNames = ["C", "Cis", "D", "Dis", "E", "F", "Fis", "G", "Gis", "A", "B", "H"];
        const noteValues = {
            // Podstawowe
            C:0, "C#":1, Cis:1, Db:1,
            D:2, "D#":3, Dis:3, Eb:3,
            E:4, Es:3, Eis:5, Fes:4,
            F:5, "F#":6, Fis:6, Gb:6,
            G:7, "G#":8, Gis:8, Ab:8,
            A:9, "A#":10, Ais:10, B:10,
            H:11, Bis:0,
            // Podwójne podwyższenia/obniżenia (np. Cisis, Disis, Fisis) —
            // sprowadzane do najbliższego poprawnego dźwięku, bo "Cisis" itp.
            // jako nazwa akordu nie istnieje, tylko D, E, G itd.
            Cisis:2, Disis:4, Eisis:7, Fisis:7, Gisis:9, Aisis:11, Hisis:1,
            Ceses:10, Deses:0, Eeses:2, Feses:3, Geses:5, Aeses:7, Heses:9
        };

        let allSongs = [];
        let currentSong = null;
        
        // Zmienne do transpozycji
        let currentTransposition = 0;
        let isUkuMode = false;

        // Zmienne do wyglądu
        let songFontSize = 1;
        let chordFontSize = 1.28;

        // Sortowanie kategorii: "alpha" (alfabetyczne) lub "freq" (najczęstsze najpierw)
        let tagSortMode = "alpha";

        // Układ akordów: "beside" (obok tekstu, domyślnie) lub "above" (nad tekstem)
        let chordLayoutMode = localStorage.getItem("chordLayoutMode") || "beside";

        // Zmienne do autoscrollingu
        let scrollSpeedState = 0; // 0: off, 1: wolno, 2: średnio, 3: szybko
        let scrollAnimationId;
        let lastTimestamp = 0;
        let accumulatedScroll = 0;

        // Blokada wygaszania ekranu (Wake Lock API)
        let wakeLock = null;
        let wakeLockWanted = false; // czy użytkownik chce mieć aktywną blokadę (np. po powrocie z tła)

        const body = document.body;
        const searchInput = document.getElementById("search");
        const defaultSections = document.getElementById("default-sections");
        const searchResultsSection = document.getElementById("search-results-section");

        // Bindowanie zdarzeń UI
        document.getElementById("sidebar-toggle").addEventListener("click", () => body.classList.toggle("sidebar-hidden"));
        document.getElementById("sidebar-close").addEventListener("click", () => body.classList.add("sidebar-hidden"));
        
        document.getElementById("random-btn").addEventListener("click", () => {
            if(allSongs.length > 0) {
                const randomSong = allSongs[Math.floor(Math.random() * allSongs.length)];
                displaySong(randomSong);
                history.pushState(null, "", `#/${encodeURIComponent(randomSong.title)}`);
            }
        });

        document.getElementById("newest-btn").addEventListener("click", () => {
            if (allSongs.length > 0) {
                const newestSong = allSongs[allSongs.length - 1];
                displaySong(newestSong);
                history.pushState(null, "", `#/${encodeURIComponent(newestSong.title)}`);
                if (window.matchMedia("(max-width: 780px)").matches) body.classList.add("sidebar-hidden");
            }
        });

        document.getElementById("reroll-random-btn").addEventListener("click", renderRandomSidebarList);

        document.getElementById("tag-sort-toggle").addEventListener("click", () => {
            tagSortMode = tagSortMode === "alpha" ? "freq" : "alpha";
            renderTagCloud();
        });

        document.getElementById("transpose-down").addEventListener("click", () => changeTransposition(-1));
        document.getElementById("transpose-up").addEventListener("click", () => changeTransposition(1));
        document.getElementById("transpose-uku").addEventListener("click", toggleUku);
        document.getElementById("transpose-reset").addEventListener("click", resetTransposition);
        
        document.getElementById("text-smaller").addEventListener("click", () => changeTextSize(-0.1));
        document.getElementById("text-bigger").addEventListener("click", () => changeTextSize(0.1));

        document.getElementById("chord-layout-toggle").addEventListener("click", () => {
            chordLayoutMode = chordLayoutMode === "beside" ? "above" : "beside";
            localStorage.setItem("chordLayoutMode", chordLayoutMode);
            applyChordLayoutMode();
        });

        function applyChordLayoutMode() {
            body.classList.toggle("chords-above", chordLayoutMode === "above");
            const btn = document.getElementById("chord-layout-toggle");
            btn.querySelector(".btn-icon").textContent = chordLayoutMode === "above" ? "⬆" : "⇄";
            btn.querySelector(".btn-label").textContent = chordLayoutMode === "above" ? "Akordy: nad" : "Akordy: obok";
        }
        applyChordLayoutMode();
        
        document.getElementById("auto-scroll-btn").addEventListener("click", toggleAutoScroll);
        document.getElementById("wake-lock-btn").addEventListener("click", toggleWakeLock);
        document.getElementById("qr-toggle-btn").addEventListener("click", toggleQrCode);
        document.getElementById("qr-close").addEventListener("click", hideQrCode);
        
        searchInput.addEventListener("input", handleSearch);
        window.addEventListener("hashchange", loadSongFromHash);

        async function loadSongs() {
            try {
                const res = await fetch("songs.json?" + new Date().getTime());
                allSongs = await res.json();
                
                allSongs.forEach(s => {
                    let tagsArray = [];
                    if (Array.isArray(s.tags)) tagsArray = s.tags;
                    else if (typeof s.tags === 'string') tagsArray = s.tags.split(',').map(t => t.trim());
                    s.tags = tagsArray.filter(t => t);
                });

                renderDefaultSidebar(); 
                
                if (window.location.hash.length > 2) {
                    loadSongFromHash();
                } else {
                    const randomSong = allSongs[Math.floor(Math.random() * allSongs.length)];
                    displaySong(randomSong);
                    history.replaceState(null, "", `#/${encodeURIComponent(randomSong.title)}`);
                }
            } catch (error) {
                document.getElementById("welcome-screen").textContent = "Błąd pobierania bazy piosenek.";
            }
        }

        function handleSearch() {
            const query = searchInput.value.trim().toLowerCase();
            if (query === "") {
                searchResultsSection.classList.add("hidden");
                defaultSections.classList.remove("hidden");
            } else {
                searchResultsSection.classList.remove("hidden");
                defaultSections.classList.add("hidden");
                
                const terms = query.split(" ");
                
                const byTitle = allSongs.filter(s => {
                    const titleLower = s.title.toLowerCase();
                    return terms.every(term => titleLower.includes(term));
                });
                
                const titleMatchNames = new Set(byTitle.map(s => s.title));

                const byLyrics = allSongs.filter(s => {
                    if (titleMatchNames.has(s.title)) return false;
                    const textToSearch = ((s.tags || []).join(" ") + " " + s.lyrics.map(l => l.text).join(" ")).toLowerCase();
                    return terms.every(term => textToSearch.includes(term));
                });
                
                const list = document.getElementById("song-list");
                list.innerHTML = "";
                const results = [...byTitle, ...byLyrics];
                
                if (results.length === 0) list.innerHTML = '<div class="empty">Nic nie znaleziono</div>';
                else results.slice(0, 50).forEach(song => list.appendChild(createSongLink(song)));
            }
        }

        function renderRandomSidebarList() {
            const randList = document.getElementById("random-list");
            if(!randList || allSongs.length === 0) return;
            randList.innerHTML = "";
            [...allSongs].sort(() => 0.5 - Math.random()).slice(0, 5).forEach(s => randList.appendChild(createSongLink(s)));
        }

        function renderDefaultSidebar() {
            renderRandomSidebarList();

            const ratedList = document.getElementById("rated-list");
            ratedList.innerHTML = "";
            let rated = allSongs.filter(s => parseInt(s.ratings_count || 0) > 0 || parseFloat(s.rating || 0) > 0);
            
            rated.sort((a, b) => {
                let scoreA = parseFloat(a.ratings_sum || 0) / parseInt(a.ratings_count || 1);
                let scoreB = parseFloat(b.ratings_sum || 0) / parseInt(b.ratings_count || 1);
                if (scoreB !== scoreA) return scoreB - scoreA;
                return parseInt(b.ratings_count || 0) - parseInt(a.ratings_count || 0);
            });
            
            const topRated = rated.slice(0, 7);
            if (topRated.length > 0) topRated.forEach(song => ratedList.appendChild(createSongLink(song)));
            else ratedList.innerHTML = '<div class="empty">Brak ocenionych utworów.</div>';

            renderTagCloud();
        }

        function renderTagCloud() {
            const toggleBtn = document.getElementById("tag-sort-toggle");
            toggleBtn.textContent = tagSortMode === "alpha" ? "A-Z" : "🔥";
            toggleBtn.title = tagSortMode === "alpha"
                ? "Sortowanie: alfabetyczne (kliknij, by sortować wg popularności)"
                : "Sortowanie: najczęstsze (kliknij, by sortować alfabetycznie)";

            const tagContainer = document.getElementById("random-tags");
            tagContainer.innerHTML = "";

            const tagCounts = new Map();
            allSongs.forEach(s => (s.tags || []).forEach(t => {
                tagCounts.set(t, (tagCounts.get(t) || 0) + 1);
            }));

            let tagEntries = Array.from(tagCounts.entries());
            if (tagSortMode === "alpha") {
                tagEntries.sort((a, b) => a[0].localeCompare(b[0], "pl"));
            } else {
                tagEntries.sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], "pl"));
            }

            tagEntries.forEach(([tag]) => {
                const btn = document.createElement("button");
                btn.className = "tag-button";
                btn.textContent = tag;
                btn.onclick = () => { searchInput.value = tag; handleSearch(); };
                tagContainer.appendChild(btn);
            });
        }

        function renderSameTagList() {
            const section = document.getElementById("same-tag-section");
            const list = document.getElementById("same-tag-list");
            list.innerHTML = "";
            
            if (!currentSong || !currentSong.tags || currentSong.tags.length === 0) {
                section.classList.add("hidden");
                return;
            }

            const currentTags = currentSong.tags.map(t => t.toLowerCase());
            let related = allSongs.filter(s => 
                s.title !== currentSong.title && 
                (s.tags || []).some(t => currentTags.includes(t.toLowerCase()))
            );

            if (related.length > 0) {
                section.classList.remove("hidden");
                related.sort(() => 0.5 - Math.random()).slice(0, 5).forEach(s => list.appendChild(createSongLink(s)));
            } else {
                section.classList.add("hidden");
            }
        }

        function renderSongNav() {
            const prevLink = document.getElementById("song-nav-prev");
            const nextLink = document.getElementById("song-nav-next");
            if (!currentSong || allSongs.length < 2) {
                prevLink.classList.add("hidden");
                nextLink.classList.add("hidden");
                return;
            }

            const idx = allSongs.findIndex(s => s.title === currentSong.title);
            if (idx === -1) {
                prevLink.classList.add("hidden");
                nextLink.classList.add("hidden");
                return;
            }

            const prevSong = idx > 0 ? allSongs[idx - 1] : null;
            const nextSong = idx < allSongs.length - 1 ? allSongs[idx + 1] : null;

            setupNavLink(prevLink, prevSong, "‹ Wcześniejsza");
            setupNavLink(nextLink, nextSong, "Następna ›");
        }

        function setupNavLink(linkEl, song, label) {
            if (!song) {
                linkEl.classList.add("hidden");
                linkEl.onclick = null;
                return;
            }
            linkEl.classList.remove("hidden");
            linkEl.innerHTML = `<span class="song-nav-label">${label}</span><span class="song-nav-title">${song.title}</span>`;
            linkEl.href = `#/${encodeURIComponent(song.title)}`;
            linkEl.onclick = (e) => {
                e.preventDefault();
                displaySong(song);
                history.pushState(null, "", `#/${encodeURIComponent(song.title)}`);
            };
        }

        function createSongLink(song) {
            const a = document.createElement("a");
            a.href = `#/${encodeURIComponent(song.title)}`;
            a.className = "song-link" + (currentSong && currentSong.title === song.title ? " active" : "");
            a.textContent = song.title;

            a.addEventListener("click", (e) => {
                e.preventDefault();
                displaySong(song);
                history.pushState(null, "", `#/${encodeURIComponent(song.title)}`);
                if (window.matchMedia("(max-width: 780px)").matches) body.classList.add("sidebar-hidden");
            });
            return a;
        }

        function loadSongFromHash() {
            if (!allSongs.length) return;
            const hash = decodeURIComponent(window.location.hash.slice(2));
            if (!hash) return;
            const song = allSongs.find(s => s.title === hash);
            if (song) {
                displaySong(song);
                if (window.matchMedia("(max-width: 780px)").matches) body.classList.add("sidebar-hidden");
            }
        }

        function displaySong(song) {
            currentSong = song;
            
            resetTransposition();
            stopAutoScroll();
            hideQrCode();
            
            document.getElementById("welcome-screen").classList.add("hidden");
            document.getElementById("song-screen").classList.remove("hidden");
            document.getElementById("content-area").scrollTop = 0;
            
            document.getElementById("song-title").textContent = song.title;
            
            const metaDiv = document.getElementById("song-meta");
            if (parseInt(song.ratings_count || 0) > 0) {
                const avg = (parseFloat(song.ratings_sum) / parseFloat(song.ratings_count)).toFixed(1);
                metaDiv.innerHTML = `<span class="rating-badge" title="Ocenianie piosenek dostępne jest tylko w wersji roboczej: spiewnik.streamlit.app">Ocena: ${avg}/5 (${song.ratings_count} głosów)</span>`;
            } else {
                metaDiv.innerHTML = "";
            }

            const tagsDiv = document.getElementById("song-tags");
            tagsDiv.innerHTML = "";
            (song.tags || []).forEach(tag => {
                const btn = document.createElement("button");
                btn.className = "tag-button";
                btn.textContent = tag;
                btn.onclick = () => { searchInput.value = tag; handleSearch(); body.classList.remove("sidebar-hidden"); };
                tagsDiv.appendChild(btn);
            });

            renderLyrics();
            renderSameTagList();
            renderSongNav();
            
            document.querySelectorAll(".song-link").forEach(link => {
                link.classList.toggle("active", link.textContent === song.title);
            });
        }

        function renderLyrics() {
            const container = document.getElementById("song-body");
            container.innerHTML = "";
            currentSong.lyrics.forEach(line => {
                const row = document.createElement("div");
                row.className = "song-line";

                if (line.chords && line.chords.length > 0) {
                    const chordSpan = document.createElement("div");
                    chordSpan.className = "chords";
                    chordSpan.textContent = line.chords.map(c => transposeChordStr(c, currentTransposition)).join(" ");
                    row.appendChild(chordSpan);
                }

                const lyricSpan = document.createElement("div");
                lyricSpan.className = "lyric";
                lyricSpan.innerHTML = (line.text || " ").replace(/\n/g, "<br>");
                row.appendChild(lyricSpan);

                container.appendChild(row);
            });
        }

        // ---- LOGIKA TRANSPOZYCJI ----

        function updateTranspositionUI() {
            document.getElementById("transposition-val").textContent = currentTransposition > 0 ? `+${currentTransposition}` : currentTransposition;
            document.getElementById("transpose-uku").querySelector(".btn-label").textContent = isUkuMode ? "Gitara" : "Uku";
        }

        function changeTransposition(steps) {
            if (!currentSong) return;
            currentTransposition += steps;
            updateTranspositionUI();
            renderLyrics();
        }

        function toggleUku() {
            if (!currentSong) return;
            if (isUkuMode) {
                currentTransposition -= 7;
                isUkuMode = false;
            } else {
                currentTransposition += 7;
                isUkuMode = true;
            }
            updateTranspositionUI();
            renderLyrics();
        }

        function resetTransposition() {
            currentTransposition = 0;
            isUkuMode = false;
            updateTranspositionUI();
            if(currentSong) renderLyrics();
        }

        function transposeChordStr(chordStr, steps) {
            // Najpierw zawsze normalizujemy zapis nuty (np. Eis -> F, Cisis -> D),
            // nawet gdy steps === 0, bo w danych źródłowych mogą wystąpić
            // niepoprawne/nietypowe zapisy enharmoniczne (np. podwójne podwyższenia).
            const match = chordStr.match(/^([A-Ha-h](?:isis|is|eses|es|s|##|#|bb|b)?)(.*)$/);
            if (!match) return chordStr;

            let base = match[1];
            const rest = match[2];
            let isMinor = base.charAt(0) === base.charAt(0).toLowerCase();
            base = base.charAt(0).toUpperCase() + base.slice(1);

            let val = noteValues[base];
            if (val === undefined) return chordStr;

            let newVal = ((val + steps) % 12 + 12) % 12;
            let newBase = polishNames[newVal];

            return (isMinor ? newBase.toLowerCase() : newBase) + rest;
        }

        // ---- LOGIKA ROZMIARU TEKSTU ----

        function changeTextSize(delta) {
            songFontSize = Math.max(0.8, Math.min(2.0, songFontSize + delta));
            chordFontSize = Math.max(1.0, Math.min(2.5, chordFontSize + delta * 1.3));
            document.documentElement.style.setProperty("--song-font-size", `${songFontSize}rem`);
            document.documentElement.style.setProperty("--chord-font-size", `${chordFontSize}rem`);
        }

        // ---- LOGIKA AUTOSCROLLINGU ----

        function toggleAutoScroll() {
            const btn = document.getElementById("auto-scroll-btn");
            scrollSpeedState = (scrollSpeedState + 1) % 4; // 0, 1, 2, 3

            if (scrollSpeedState === 0) {
                stopAutoScroll();
            } else {
                btn.innerHTML = `<span class="btn-icon">⏸ x${scrollSpeedState}</span><span class="btn-label">Prędkość x${scrollSpeedState}</span>`;
                if (scrollSpeedState === 1) { 
                    lastTimestamp = 0;
                    accumulatedScroll = 0;
                    scrollAnimationId = requestAnimationFrame(autoScrollLoop);
                }
            }
        }

        function stopAutoScroll() {
            scrollSpeedState = 0;
            document.getElementById("auto-scroll-btn").innerHTML = '<span class="btn-icon">▶</span><span class="btn-label">Przewijaj</span>';
            cancelAnimationFrame(scrollAnimationId);
            lastTimestamp = 0;
            accumulatedScroll = 0;
        }

        function autoScrollLoop(timestamp) {
            if (scrollSpeedState > 0) {
                if (!lastTimestamp) lastTimestamp = timestamp;
                const deltaTime = timestamp - lastTimestamp;
                lastTimestamp = timestamp;

                let pixelsPerSecond = 0;
                if(scrollSpeedState === 1) pixelsPerSecond = 8;
                else if(scrollSpeedState === 2) pixelsPerSecond = 15;
                else if(scrollSpeedState === 3) pixelsPerSecond = 25;

                accumulatedScroll += (pixelsPerSecond * deltaTime) / 1000;

                if (accumulatedScroll >= 1) {
                    const pixelsToScroll = Math.floor(accumulatedScroll);
                    document.getElementById("content-area").scrollTop += pixelsToScroll;
                    accumulatedScroll -= pixelsToScroll;
                }

                scrollAnimationId = requestAnimationFrame(autoScrollLoop);
            }
        }

        // ---- LOGIKA KODU QR ----

        function toggleQrCode() {
            const box = document.getElementById("qr-box");
            if (!box.classList.contains("hidden")) {
                hideQrCode();
                return;
            }
            if (!currentSong) return;

            const url = window.location.origin + window.location.pathname +
                "#/" + encodeURIComponent(currentSong.title);

            const qr = qrcode(0, "M"); // typeNumber 0 = auto-dobór rozmiaru, poziom korekcji M
            qr.addData(url);
            qr.make();

            document.getElementById("qr-img").src = qr.createDataURL(8, 8);
            box.classList.remove("hidden");
        }

        function hideQrCode() {
            document.getElementById("qr-box").classList.add("hidden");
        }

        // ---- LOGIKA BLOKADY WYGASZANIA EKRANU (WAKE LOCK) ----

        const wakeLockSupported = "wakeLock" in navigator;
        const wakeLockBtn = document.getElementById("wake-lock-btn");

        if (!wakeLockSupported) {
            // Brak wsparcia w tej przeglądarce — chowamy przycisk zamiast pokazywać coś, co nie zadziała
            wakeLockBtn.classList.add("hidden");
        }

        async function toggleWakeLock() {
            if (!wakeLockSupported) return;

            if (wakeLock) {
                wakeLockWanted = false;
                await wakeLock.release();
                // wakeLock i UI zostaną zaktualizowane przez handler "release" poniżej
            } else {
                wakeLockWanted = true;
                await requestWakeLock();
            }
        }

        async function requestWakeLock() {
            if (!wakeLockSupported || !wakeLockWanted) return;
            try {
                wakeLock = await navigator.wakeLock.request("screen");
                updateWakeLockUI(true);
                wakeLock.addEventListener("release", () => {
                    wakeLock = null;
                    updateWakeLockUI(false);
                });
            } catch (err) {
                // Np. brak uprawnień, słaba bateria, itp. — po prostu zostawiamy wyłączone
                wakeLock = null;
                wakeLockWanted = false;
                updateWakeLockUI(false);
            }
        }

        function updateWakeLockUI(active) {
            wakeLockBtn.classList.toggle("active-toggle", active);
            wakeLockBtn.querySelector(".btn-icon").textContent = active ? "🔆" : "🔅";
            wakeLockBtn.querySelector(".btn-label").textContent = active ? "Ekran: stale wł." : "Ekran";
            wakeLockBtn.title = active ? "Wyłącz blokadę wygaszania ekranu" : "Nie wygaszaj ekranu";
        }

        // Gdy karta wraca z tła (np. po zablokowaniu telefonu), przeglądarka
        // sama zwalnia blokadę — jeśli użytkownik jej chciał, próbujemy ją odzyskać.
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible" && wakeLockWanted && !wakeLock) {
                requestWakeLock();
            }
        });

        loadSongs();
    </script>
</body>
</html>
