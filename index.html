<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <title>Śpiewnik Turystyczny</title>
    <style>
        :root {
            --bg: #101114;
            --panel: #191b20;
            --panel-2: #20232a;
            --text: #f2f2f0;
            --muted: #a7adb8;
            --border: #323741;
            --accent: #e24b4b;
            --hover: #292d35;
            --shadow: rgba(0, 0, 0, 0.28);
            --app-height: 100vh;
            --song-font-size: 1rem;
            --chord-font-size: 1.28rem;
        }

        @supports (height: 100dvh) {
            :root {
                --app-height: 100dvh;
            }
        }

        body.light {
            --bg: #f7f5f0;
            --panel: #fffdf7;
            --panel-2: #efebe2;
            --text: #22242a;
            --muted: #606772;
            --border: #d8d2c6;
            --accent: #b83030;
            --hover: #eee7da;
            --shadow: rgba(82, 66, 42, 0.16);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html { height: 100%; }

        body {
            margin: 0;
            height: var(--app-height);
            min-height: var(--app-height);
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        button, input { font: inherit; }
        button { cursor: pointer; }

        .app {
            display: flex;
            flex-direction: row;
            height: 100%;
            width: 100%;
        }

        .sidebar {
            order: 2;
            width: 330px;
            background: var(--panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: margin-right 0.3s ease, transform 0.3s ease;
            z-index: 5;
        }

        body.sidebar-hidden .sidebar {
            margin-right: -330px;
            transform: translateX(100%);
        }

        .sidebar-header {
            min-height: 44px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            border-bottom: 1px solid var(--border);
            background: var(--panel);
        }

        .sidebar-title {
            font-weight: 800;
            color: var(--accent);
        }

        .icon-button, .small-button, .tag-button, .song-link {
            border: 1px solid var(--border);
            background: var(--panel-2);
            color: var(--text);
            border-radius: 7px;
            transition: all 0.15s ease;
        }

        .icon-button {
            width: 32px; height: 32px;
            display: inline-grid; place-items: center;
        }

        .icon-button:hover, .small-button:hover, .tag-button:hover, .song-link:hover {
            background: var(--hover);
            border-color: var(--accent);
        }

        .search-wrap {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border);
            background: var(--panel);
        }

        .search-wrap input, .target-input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 10px;
            background: var(--bg);
            color: var(--text);
            outline: none;
        }

        .search-wrap input:focus { border-color: var(--accent); }

        .side-section {
            padding: 12px 10px 0;
            display: flex;
            flex-direction: column;
        }

        .side-section-title {
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .quick-list {
            display: grid;
            gap: 5px;
        }

        #search-results-section {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        #default-sections {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        .song-link {
            display: block;
            padding: 8px 10px;
            color: var(--text);
            text-decoration: none;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-link.active {
            background: color-mix(in srgb, var(--accent) 15%, var(--panel-2));
            border-color: var(--accent);
        }

        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag-button {
            padding: 5px 10px;
            font-size: 0.8rem;
        }

        .main {
            order: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            min-height: 46px;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 7px 9px;
            border-bottom: 1px solid var(--border);
            background: var(--panel);
            flex-wrap: wrap;
        }

        .topbar-group { display: flex; align-items: center; gap: 5px; }
        .brand { color: var(--accent); font-weight: 800; margin-right: 5px; }
        .topbar-divider { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }
        .small-button { padding: 4px 10px; font-size: 0.85rem; }
        .meter { padding: 4px 8px; border-radius: 7px; background: var(--bg); border: 1px solid var(--border); color: var(--accent); font-weight: 800; font-size: 0.85rem; }
        .target-input { width: 50px; padding: 4px; text-align: center; }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px clamp(15px, 3vw, 30px);
        }

        .song-screen { max-width: 900px; margin: 0 auto; }
        .song-head { padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 15px; }
        h1 { margin: 0 0 10px 0; font-size: clamp(1.5rem, 3vw, 2.2rem); line-height: 1.1; }
        
        .tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .tags .tag-button { border-color: rgba(226, 75, 75, 0.4); color: var(--accent); border-radius: 15px; }

        .song-body { font-size: var(--song-font-size); line-height: 1.3; }
        
        /* GWARANCJA POPRAWNEGO ŁAMANIA LINII */
        .song-line { 
            display: flex; 
            width: 100%;
            align-items: baseline;
            gap: 15px; 
            padding: 4px 0; 
            border-bottom: 1px solid color-mix(in srgb, var(--border) 20%, transparent); 
        }
        
        .chords { color: var(--accent); font-family: monospace; font-size: var(--chord-font-size); font-weight: 800; }
        .lyric { 
            color: var(--text); 
            white-space: pre-wrap; 
            word-break: break-word;
            flex: 1; 
            min-height: 1.2em; /* Zabezpiecza puste linijki przed zniknięciem */
        }

        .empty { color: var(--muted); font-size: 0.9rem; font-style: italic; }
        .hidden { display: none !important; }

        @media (max-width: 780px) {
            .sidebar {
                position: absolute;
                right: 0; top: 0; bottom: 0;
                width: 85vw;
                box-shadow: -5px 0 20px var(--shadow);
            }
        }
    </style>
</head>
<body class="sidebar-hidden">
    <div class="app">
        <main class="main">
            <header class="topbar">
                <div class="topbar-group">
                    <button id="sidebar-toggle" class="icon-button" title="Panel">☰</button>
                    <span class="brand">Śpiewnik</span>
                    <button id="theme-toggle" class="small-button">Dzień</button>
                </div>
                <div class="topbar-divider"></div>
                <div class="topbar-group">
                    <button id="transpose-down" class="small-button">-1</button>
                    <span id="transposition-val" class="meter">0</span>
                    <button id="transpose-up" class="small-button">+1</button>
                    <button id="transpose-uku" class="small-button" title="Transpozycja Gitara -> Ukulele">Uku +5</button>
                    <button id="transpose-reset" class="small-button">Reset</button>
                </div>
                <div class="topbar-divider"></div>
                <div class="topbar-group">
                    <button id="text-smaller" class="small-button">A-</button>
                    <button id="text-bigger" class="small-button">A+</button>
                </div>
            </header>

            <div id="content-area" class="content">
                <section id="song-screen" class="song-screen hidden">
                    <div class="song-head">
                        <h1 id="song-title"></h1>
                        <div id="song-meta" style="color: var(--muted); font-size: 0.85rem; margin-bottom: 10px;"></div>
                        <div id="song-tags" class="tags"></div>
                    </div>
                    <div id="song-body" class="song-body"></div>
                </section>
                <div id="welcome-screen" class="empty">Pobieranie bazy piosenek...</div>
            </div>
        </main>

        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <button id="sidebar-close" class="icon-button">✕</button>
                <div class="sidebar-title">Menu</div>
            </div>

            <div class="search-wrap">
                <input type="search" id="search" placeholder="Szukaj (tytuł, tekst, tag)...">
            </div>

            <section id="search-results-section" class="side-section hidden">
                <div class="side-section-title">Wyniki wyszukiwania</div>
                <div id="song-list" class="quick-list"></div>
            </section>

            <div id="default-sections">
                <section id="same-tag-section" class="side-section hidden">
                    <div class="side-section-title">Podobne utwory</div>
                    <div id="same-tag-list" class="quick-list"></div>
                </section>

            <div id="default-sections" class="side-section">
                <div class="side-section-title">Propozycje losowe</div>
                <div id="random-list" class="quick-list"></div>
            </div>

                <section class="side-section">
                    <div class="side-section-title">Najwyżej oceniane / Ulubione</div>
                    <div id="rated-list" class="quick-list"></div>
                </section>

                <section class="side-section">
                    <div class="side-section-title">Kategorie</div>
                    <div id="random-tags" class="tag-cloud"></div>
                </section>
            </div>
        </aside>
    </div>

    <script>
        const polishNames = ["C", "Cis", "D", "Dis", "E", "F", "Fis", "G", "Gis", "A", "B", "H"];
        const noteValues = {
            C:0, "C#":1, Cis:1, Db:1,
            D:2, "D#":3, Dis:3, Eb:3,
            E:4,
            F:5, "F#":6, Fis:6, Gb:6,
            G:7, "G#":8, Gis:8, Ab:8,
            A:9, "A#":10, Ais:10, B:10,
            H:11
        };

        let allSongs = [];
        let currentSong = null;
        let currentTransposition = 0;
        let songFontSize = 1;
        let chordFontSize = 1.28;

        const body = document.body;
        const searchInput = document.getElementById("search");
        const defaultSections = document.getElementById("default-sections");
        const searchResultsSection = document.getElementById("search-results-section");

        // Bindowanie zdarzeń
        document.getElementById("sidebar-toggle").addEventListener("click", () => body.classList.toggle("sidebar-hidden"));
        document.getElementById("sidebar-close").addEventListener("click", () => body.classList.add("sidebar-hidden"));
        document.getElementById("theme-toggle").addEventListener("click", () => {
            body.classList.toggle("light");
            document.getElementById("theme-toggle").textContent = body.classList.contains("light") ? "Noc" : "Dzień";
        });
        document.getElementById("transpose-down").addEventListener("click", () => changeTransposition(-1));
        document.getElementById("transpose-up").addEventListener("click", () => changeTransposition(1));
        document.getElementById("transpose-uku").addEventListener("click", () => changeTransposition(5));
        document.getElementById("transpose-reset").addEventListener("click", () => changeTransposition(-currentTransposition));
        document.getElementById("text-smaller").addEventListener("click", () => changeTextSize(-0.1));
        document.getElementById("text-bigger").addEventListener("click", () => changeTextSize(0.1));
        
        searchInput.addEventListener("input", handleSearch);
        window.addEventListener("hashchange", loadSongFromHash);

        // Ładowanie bazy
        async function loadSongs() {
            const res = await fetch("songs.json");
            allSongs = await res.json();
            
            renderRandomList(); // Generuje listę losową w panelu
            
            // Losowanie piosenki startowej
            const randomSong = allSongs[Math.floor(Math.random() * allSongs.length)];
            displaySong(randomSong);
        }

        function renderRandomList() {
            const list = document.getElementById("random-list");
            list.innerHTML = "";
            // Losujemy 5 piosenek z całej bazy
            [...allSongs].sort(() => 0.5 - Math.random()).slice(0, 5).forEach(s => {
                const a = document.createElement("a");
                a.className = "song-link";
                a.textContent = s.title;
                a.style.cursor = "pointer";
                a.onclick = () => displaySong(s);
                list.appendChild(a);
            });
        }

        // Obsługa wyszukiwarki
        function handleSearch() {
            const query = searchInput.value.trim().toLowerCase();
            if (query === "") {
                searchResultsSection.classList.add("hidden");
                defaultSections.classList.remove("hidden");
            } else {
                searchResultsSection.classList.remove("hidden");
                defaultSections.classList.add("hidden");
                
                const terms = query.split(" ");
                const results = allSongs.filter(s => {
                    const textToSearch = (s.title + " " + (s.tags || []).join(" ") + " " + s.lyrics.map(l => l.text).join(" ")).toLowerCase();
                    return terms.every(term => textToSearch.includes(term));
                });
                
                const list = document.getElementById("song-list");
                list.innerHTML = results.length ? "" : '<div class="empty">Nic nie znaleziono</div>';
                results.slice(0, 50).forEach(song => list.appendChild(createSongLink(song)));
            }
        }

        // Renderowanie domyślnego panelu bocznego - Z poprawionym filtrowaniem Ocen
        function renderDefaultSidebar() {
            const ratedList = document.getElementById("rated-list");
            ratedList.innerHTML = "";
            
            // Poprawione czytanie wartości tekstowych jako liczb
            let rated = allSongs.filter(s => parseInt(s.ratings_count || 0) > 0);
            
            rated.sort((a, b) => {
                let scoreA = parseFloat(a.ratings_sum || 0) / parseFloat(a.ratings_count || 1);
                let scoreB = parseFloat(b.ratings_sum || 0) / parseFloat(b.ratings_count || 1);
                if (scoreB !== scoreA) return scoreB - scoreA;
                return parseInt(b.ratings_count || 0) - parseInt(a.ratings_count || 0);
            });
            
            const topRated = rated.slice(0, 7);
            if (topRated.length > 0) {
                topRated.forEach(song => ratedList.appendChild(createSongLink(song)));
            } else {
                ratedList.innerHTML = '<div class="empty">Brak ocenionych utworów.</div>';
            }

            const tagContainer = document.getElementById("random-tags");
            tagContainer.innerHTML = "";
            let allTags = new Set();
            allSongs.forEach(s => (s.tags || []).forEach(t => { if(t.trim()) allTags.add(t.trim()); }));
            
            Array.from(allTags).sort().forEach(tag => {
                const btn = document.createElement("button");
                btn.className = "tag-button";
                btn.textContent = tag;
                btn.onclick = () => {
                    searchInput.value = tag;
                    handleSearch();
                };
                tagContainer.appendChild(btn);
            });
        }

        function renderSameTagList() {
            const section = document.getElementById("same-tag-section");
            const list = document.getElementById("same-tag-list");
            list.innerHTML = "";
            
            if (!currentSong || !currentSong.tags || currentSong.tags.length === 0) {
                section.classList.add("hidden");
                return;
            }

            const currentTags = currentSong.tags.map(t => t.toLowerCase());
            let related = allSongs.filter(s => 
                s.title !== currentSong.title && 
                (s.tags || []).some(t => currentTags.includes(t.toLowerCase()))
            );

            if (related.length > 0) {
                section.classList.remove("hidden");
                related.sort(() => 0.5 - Math.random()).slice(0, 5).forEach(s => list.appendChild(createSongLink(s)));
            } else {
                section.classList.add("hidden");
            }
        }

        function createSongLink(song) {
            const a = document.createElement("a");
            a.href = `#/${encodeURIComponent(song.title)}`;
            a.className = "song-link" + (currentSong && currentSong.title === song.title ? " active" : "");
            a.textContent = song.title;
            return a;
        }

        function loadSongFromHash() {
            if (!allSongs.length) return;
            const hash = decodeURIComponent(window.location.hash.slice(2));
            if (!hash) return;
            
            const song = allSongs.find(s => s.title === hash);
            if (song) {
                displaySong(song);
                if (window.matchMedia("(max-width: 780px)").matches) {
                    body.classList.add("sidebar-hidden");
                }
            }
        }

        function displaySong(song) {
            currentSong = song;
            currentTransposition = 0;
            document.getElementById("transposition-val").textContent = "0";
            
            document.getElementById("welcome-screen").classList.add("hidden");
            document.getElementById("song-screen").classList.remove("hidden");
            document.getElementById("content-area").scrollTop = 0;
            
            document.getElementById("song-title").textContent = song.title;
            
            const metaDiv = document.getElementById("song-meta");
            if (parseInt(song.ratings_count || 0) > 0) {
                const avg = (parseFloat(song.ratings_sum) / parseFloat(song.ratings_count)).toFixed(1);
                metaDiv.textContent = `Ocena: ${avg}/5 (${song.ratings_count} głosów)`;
            } else {
                metaDiv.textContent = "";
            }

            const tagsDiv = document.getElementById("song-tags");
            tagsDiv.innerHTML = "";
            (song.tags || []).forEach(tag => {
                const btn = document.createElement("button");
                btn.className = "tag-button";
                btn.textContent = tag;
                btn.onclick = () => {
                    searchInput.value = tag;
                    handleSearch();
                    body.classList.remove("sidebar-hidden");
                };
                tagsDiv.appendChild(btn);
            });

            renderLyrics();
            renderSameTagList();
            
            document.querySelectorAll(".song-link").forEach(link => {
                link.classList.toggle("active", link.textContent === song.title);
            });
        }

        function renderLyrics() {
            const container = document.getElementById("song-body");
            container.innerHTML = "";
            currentSong.lyrics.forEach(line => {
                const row = document.createElement("div");
                row.className = "song-line";
                
                const lyricSpan = document.createElement("div");
                lyricSpan.className = "lyric";
                // Używamy innerHTML i zamieniamy ewentualne \n na twarde breaki dla bezpieczeństwa formatowania
                let textContent = line.text || " ";
                lyricSpan.innerHTML = textContent.replace(/\n/g, "<br>");
                
                row.appendChild(lyricSpan);

                if (line.chords && line.chords.length > 0) {
                    const chordSpan = document.createElement("div");
                    chordSpan.className = "chords";
                    chordSpan.textContent = line.chords.map(c => transposeChordStr(c, currentTransposition)).join(" ");
                    row.appendChild(chordSpan);
                }
                
                container.appendChild(row);
            });
        }

        function transposeChordStr(chordStr, steps) {
            if (steps === 0) return chordStr;
            const match = chordStr.match(/^([A-Ha-h][#bis]??)(.*)$/);
            if (!match) return chordStr;
            
            let base = match[1];
            let isMinor = base === base.toLowerCase();
            base = base.charAt(0).toUpperCase() + base.slice(1);
            
            if (base === "B") base = "Ais";
            
            let val = noteValues[base];
            if (val === undefined) return chordStr;

            let newVal = ((val + steps) % 12 + 12) % 12;
            let newBase = polishNames[newVal];
            
            return (isMinor ? newBase.toLowerCase() : newBase) + match[2];
        }

        function changeTransposition(steps) {
            if (!currentSong) return;
            currentTransposition += steps;
            document.getElementById("transposition-val").textContent = currentTransposition > 0 ? `+${currentTransposition}` : currentTransposition;
            renderLyrics();
        }

        function changeTextSize(delta) {
            songFontSize = Math.max(0.8, Math.min(2.0, songFontSize + delta));
            chordFontSize = Math.max(1.0, Math.min(2.5, chordFontSize + delta * 1.3));
            document.documentElement.style.setProperty("--song-font-size", `${songFontSize}rem`);
            document.documentElement.style.setProperty("--chord-font-size", `${chordFontSize}rem`);
        }
        
        function toggleInstrument() {
            const btn = document.getElementById("transpose-toggle");
            // Uku +5 to standardowa transpozycja z Gitary na Ukulele
            if (currentTransposition === 7) {
                currentTransposition = 0;
                btn.textContent = "Uku (Gitara)";
            } else {
                currentTransposition = 7;
                btn.textContent = "Gitara (Ukulele)";
            }
            renderLyrics();
        }

        function transpose(chord) {
            const match = chord.match(/^([A-Ha-h][#bis]??)(.*)$/);
            if (!match) return chord;
            
            let base = match[1].charAt(0).toUpperCase() + match[1].slice(1);
            if (base === "B") base = "Ais"; 
            
            let val = noteValues[base];
            if (val === undefined) return chord;
            
            // Logika matematyczna przesunięcia
            let newVal = ((val + currentTransposition) % 12 + 12) % 12;
            return polishNames[newVal] + match[2];
        }

        loadSongs();
    </script>
</body>
</html>
