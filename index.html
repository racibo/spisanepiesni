<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Śpiewnik Turystyczny</title>
    <style>
        :root {
            --bg: #101114;
            --panel: #191b20;
            --panel-2: #20232a;
            --text: #f2f2f0;
            --muted: #a7adb8;
            --border: #323741;
            --accent: #e24b4b;
            --accent-2: #f7c948;
            --hover: #292d35;
            --shadow: rgba(0, 0, 0, 0.28);
        }

        body.light {
            --bg: #f7f5f0;
            --panel: #fffdf7;
            --panel-2: #efebe2;
            --text: #22242a;
            --muted: #606772;
            --border: #d8d2c6;
            --accent: #b83030;
            --accent-2: #8a6500;
            --hover: #eee7da;
            --shadow: rgba(82, 66, 42, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden;
        }

        button,
        input {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        .app {
            display: grid;
            grid-template-columns: 290px minmax(0, 1fr);
            height: 100%;
            min-width: 0;
        }

        body.sidebar-hidden .app {
            grid-template-columns: 0 minmax(0, 1fr);
        }

        .sidebar {
            min-width: 0;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.2s ease, opacity 0.2s ease;
            z-index: 5;
        }

        body.sidebar-hidden .sidebar {
            transform: translateX(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .sidebar-header,
        .topbar {
            min-height: 48px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            background: var(--panel);
        }

        .sidebar-title {
            font-weight: 800;
            color: var(--accent);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .icon-button,
        .small-button,
        .tag-button,
        .song-link,
        .favorite-button {
            border: 1px solid var(--border);
            background: var(--panel-2);
            color: var(--text);
            border-radius: 7px;
            transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
        }

        .icon-button {
            width: 34px;
            height: 34px;
            display: inline-grid;
            place-items: center;
            flex: 0 0 auto;
        }

        .icon-button:hover,
        .small-button:hover,
        .tag-button:hover,
        .song-link:hover,
        .favorite-button:hover {
            background: var(--hover);
            border-color: var(--accent);
        }

        .search-wrap {
            padding: 9px 10px;
            border-bottom: 1px solid var(--border);
        }

        .search-wrap input,
        .target-input {
            width: 100%;
            min-width: 0;
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 8px 9px;
            background: var(--bg);
            color: var(--text);
            outline: none;
        }

        .search-wrap input:focus,
        .target-input:focus {
            border-color: var(--accent);
        }

        .side-section {
            padding: 8px 8px 0;
            min-height: 0;
        }

        .side-section-title {
            margin: 4px 2px 6px;
            color: var(--muted);
            font-size: 0.76rem;
            font-weight: 750;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .quick-list {
            display: grid;
            gap: 4px;
            margin-bottom: 8px;
        }

        .song-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: grid;
            align-content: start;
            gap: 4px;
        }

        .song-row {
            display: grid;
            grid-template-columns: 30px minmax(0, 1fr);
            gap: 5px;
            align-items: stretch;
        }

        .favorite-button {
            width: 30px;
            min-height: 30px;
            padding: 0;
            color: var(--muted);
        }

        .favorite-button.active {
            color: var(--accent-2);
            border-color: color-mix(in srgb, var(--accent-2), var(--border));
        }

        .song-link {
            display: block;
            min-width: 0;
            padding: 6px 8px;
            color: var(--text);
            text-decoration: none;
            font-size: 0.9rem;
            line-height: 1.18;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-link.active {
            background: color-mix(in srgb, var(--accent) 18%, var(--panel-2));
            border-color: var(--accent);
            color: var(--text);
        }

        .main {
            min-width: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 4;
            box-shadow: 0 1px 0 var(--border);
        }

        .topbar-left,
        .topbar-right,
        .button-row {
            display: flex;
            align-items: center;
            gap: 7px;
            min-width: 0;
            flex-wrap: wrap;
        }

        .brand {
            color: var(--accent);
            font-weight: 800;
            white-space: nowrap;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 12px clamp(10px, 2vw, 22px) 28px;
            scroll-behavior: smooth;
        }

        .song-screen {
            max-width: 1040px;
            margin: 0 auto;
        }

        .song-head {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: start;
            padding-bottom: 9px;
            border-bottom: 1px solid var(--border);
        }

        .title-row {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.35rem, 2.5vw, 2.15rem);
            line-height: 1.05;
            letter-spacing: 0;
            overflow-wrap: anywhere;
        }

        .tags {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 7px;
        }

        .tag-button {
            padding: 3px 7px;
            font-size: 0.78rem;
            color: var(--muted);
        }

        .tag-button.active {
            color: var(--text);
            border-color: var(--accent);
        }

        .controls {
            display: grid;
            gap: 7px;
            justify-items: end;
            max-width: 520px;
        }

        .small-button {
            min-height: 32px;
            padding: 5px 9px;
            font-size: 0.86rem;
            white-space: nowrap;
        }

        .small-button.primary {
            border-color: var(--accent);
            color: var(--text);
        }

        .meter {
            min-width: 42px;
            padding: 5px 8px;
            border-radius: 7px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--accent);
            text-align: center;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-weight: 800;
        }

        .target-control {
            display: grid;
            grid-template-columns: auto 70px auto;
            gap: 6px;
            align-items: center;
            color: var(--muted);
            font-size: 0.86rem;
        }

        .target-input {
            padding: 5px 7px;
            text-align: center;
            text-transform: none;
        }

        .song-body {
            margin-top: 9px;
            font-size: clamp(0.9rem, 1.4vw, 1rem);
            line-height: 1.16;
        }

        .song-line {
            display: flex;
            gap: 8px;
            align-items: baseline;
            padding: 1px 0;
            border-bottom: 1px solid color-mix(in srgb, var(--border) 45%, transparent);
            min-width: 0;
        }

        .song-line:hover {
            background: color-mix(in srgb, var(--hover) 35%, transparent);
        }

        .chords {
            flex: 0 1 auto;
            min-width: 0;
            color: var(--accent);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.84em;
            font-weight: 800;
            line-height: 1.12;
            overflow-wrap: anywhere;
        }

        .lyric {
            min-width: 0;
            color: var(--text);
            overflow-wrap: anywhere;
            white-space: pre-wrap;
        }

        .empty {
            color: var(--muted);
            padding: 16px;
            text-align: center;
            font-size: 0.9rem;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 780px) {
            .app {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: fixed;
                inset: 0 auto 0 0;
                width: min(88vw, 320px);
                box-shadow: 12px 0 28px var(--shadow);
            }

            body:not(.sidebar-hidden) .sidebar {
                transform: translateX(0);
                opacity: 1;
                pointer-events: auto;
            }

            body.sidebar-hidden .sidebar {
                transform: translateX(-100%);
            }

            .song-head {
                grid-template-columns: 1fr;
            }

            .controls {
                justify-items: start;
                max-width: none;
            }

            .target-control {
                grid-template-columns: 1fr 68px auto;
                width: 100%;
            }

            .topbar {
                align-items: flex-start;
            }
        }
    </style>
</head>
<body class="sidebar-hidden">
    <div class="app">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <button id="sidebar-close" class="icon-button" title="Ukryj panel" aria-label="Ukryj panel">☰</button>
                <div class="sidebar-title">Śpiewnik</div>
            </div>

            <div class="search-wrap">
                <input type="search" id="search" placeholder="Szukaj tytułu lub tagu...">
            </div>

            <section class="side-section">
                <div class="side-section-title">Ulubione</div>
                <div id="favorites-list" class="quick-list"></div>
            </section>

            <section class="side-section">
                <div class="side-section-title">Najnowsze utwory</div>
                <div id="latest-list" class="quick-list"></div>
            </section>

            <section class="song-list" id="song-list">
                <div class="empty">Ładowanie bazy utworów...</div>
            </section>
        </aside>

        <main class="main">
            <header class="topbar">
                <div class="topbar-left">
                    <button id="sidebar-toggle" class="icon-button" title="Pokaż lub ukryj panel" aria-label="Pokaż lub ukryj panel">☰</button>
                    <span class="brand">Śpiewnik</span>
                </div>
                <div class="topbar-right">
                    <button id="theme-toggle" class="small-button" type="button">Tryb dzienny</button>
                    <button id="random-song" class="small-button" type="button">Losuj</button>
                </div>
            </header>

            <div id="content-area" class="content">
                <section id="song-screen" class="song-screen hidden">
                    <div class="song-head">
                        <div>
                            <div class="title-row">
                                <button id="favorite-current" class="favorite-button" type="button" title="Dodaj do ulubionych" aria-label="Dodaj do ulubionych">☆</button>
                                <h1 id="song-title">Tytuł piosenki</h1>
                            </div>
                            <div id="song-tags" class="tags"></div>
                        </div>

                        <div class="controls">
                            <div class="button-row" aria-label="Transpozycja">
                                <button id="transpose-down" class="small-button" type="button">-1</button>
                                <span id="transposition-val" class="meter">0</span>
                                <button id="transpose-up" class="small-button" type="button">+1</button>
                                <button id="transpose-reset" class="small-button" type="button">Reset</button>
                            </div>

                            <div class="target-control">
                                <span>Docelowy pierwszy akord:</span>
                                <input id="target-chord" class="target-input" value="C" aria-label="Docelowy pierwszy akord">
                                <button id="apply-target" class="small-button primary" type="button">Zastosuj</button>
                            </div>

                            <div class="button-row">
                                <button id="ukulele-mode" class="small-button" type="button">🎸→🪕 Ukulele</button>
                                <button id="guitar-mode" class="small-button" type="button">🪕→🎸 Gitara</button>
                            </div>

                            <div class="button-row" aria-label="Autoscroll">
                                <button id="scroll-slower" class="small-button" type="button">↑</button>
                                <span id="scroll-speed" class="meter">0</span>
                                <button id="scroll-faster" class="small-button" type="button">↓</button>
                                <button id="scroll-stop" class="small-button" type="button">Stop</button>
                            </div>
                        </div>
                    </div>

                    <div id="song-body" class="song-body"></div>
                </section>

                <div id="welcome-screen" class="empty">Ładowanie...</div>
            </div>
        </main>
    </div>

    <script>
        const storageKeys = {
            lastSong: "spiewnik:lastSong",
            transposition: "spiewnik:transposition",
            sidebarHidden: "spiewnik:sidebarHidden",
            favorites: "spiewnik:favorites",
            theme: "spiewnik:theme",
            scrollSpeed: "spiewnik:scrollSpeed"
        };

        const sharpNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "Bb", "H"];
        const flatNames = ["C", "Db", "D", "Eb", "E", "F", "Gb", "G", "Ab", "A", "Bb", "H"];
        const polishNames = ["C", "Cis", "D", "Dis", "E", "F", "Fis", "G", "Gis", "A", "B", "H"];
        const noteValues = {
            C: 0, "C#": 1, Cis: 1, Db: 1, Des: 1,
            D: 2, "D#": 3, Dis: 3, Eb: 3, Es: 3,
            E: 4,
            F: 5, "F#": 6, Fis: 6, Gb: 6, Ges: 6,
            G: 7, "G#": 8, Gis: 8, Ab: 8, As: 8,
            A: 9, "A#": 10, Ais: 10, Bb: 10, B: 10,
            H: 11
        };

        let allSongs = [];
        let currentSong = null;
        let currentTransposition = readNumber(storageKeys.transposition, 0);
        let activeTag = "";
        let favorites = readJson(storageKeys.favorites, []);
        let scrollSpeed = readNumber(storageKeys.scrollSpeed, 0);
        let scrollFrame = null;
        let lastScrollTime = 0;

        const body = document.body;
        const sidebar = document.getElementById("sidebar");
        const contentArea = document.getElementById("content-area");
        const searchInput = document.getElementById("search");
        const songList = document.getElementById("song-list");
        const latestList = document.getElementById("latest-list");
        const favoritesList = document.getElementById("favorites-list");
        const songScreen = document.getElementById("song-screen");
        const welcomeScreen = document.getElementById("welcome-screen");
        const songTitle = document.getElementById("song-title");
        const songTags = document.getElementById("song-tags");
        const songBody = document.getElementById("song-body");
        const transpositionVal = document.getElementById("transposition-val");
        const targetChord = document.getElementById("target-chord");
        const favoriteCurrent = document.getElementById("favorite-current");
        const themeToggle = document.getElementById("theme-toggle");
        const scrollSpeedLabel = document.getElementById("scroll-speed");

        initSettings();
        bindEvents();
        loadSongs();

        function initSettings() {
            const hidden = localStorage.getItem(storageKeys.sidebarHidden);
            const defaultHidden = window.matchMedia("(max-width: 780px)").matches;
            body.classList.toggle("sidebar-hidden", hidden === null ? defaultHidden : hidden === "true");

            const theme = localStorage.getItem(storageKeys.theme);
            body.classList.toggle("light", theme === "light");
            updateThemeButton();
            updateScrollSpeed();
        }

        function bindEvents() {
            document.getElementById("sidebar-toggle").addEventListener("click", toggleSidebar);
            document.getElementById("sidebar-close").addEventListener("click", toggleSidebar);
            document.getElementById("transpose-down").addEventListener("click", () => changeTransposition(-1));
            document.getElementById("transpose-up").addEventListener("click", () => changeTransposition(1));
            document.getElementById("transpose-reset").addEventListener("click", resetTransposition);
            document.getElementById("apply-target").addEventListener("click", transposeToTarget);
            document.getElementById("ukulele-mode").addEventListener("click", () => changeTransposition(5));
            document.getElementById("guitar-mode").addEventListener("click", () => changeTransposition(-5));
            document.getElementById("random-song").addEventListener("click", showRandomSong);
            document.getElementById("theme-toggle").addEventListener("click", toggleTheme);
            document.getElementById("favorite-current").addEventListener("click", () => {
                if (currentSong) toggleFavorite(currentSong.title);
            });
            document.getElementById("scroll-slower").addEventListener("click", () => setScrollSpeed(scrollSpeed - 1));
            document.getElementById("scroll-faster").addEventListener("click", () => setScrollSpeed(scrollSpeed + 1));
            document.getElementById("scroll-stop").addEventListener("click", () => setScrollSpeed(0));
            searchInput.addEventListener("input", () => {
                activeTag = "";
                renderAllLists();
            });
            targetChord.addEventListener("keydown", event => {
                if (event.key === "Enter") transposeToTarget();
            });
            window.addEventListener("hashchange", handleRouting);
        }

        async function loadSongs() {
            try {
                const response = await fetch("songs.json");
                if (!response.ok) throw new Error("Nie udało się pobrać pliku songs.json");
                allSongs = await response.json();
                renderAllLists();
                handleRouting();
            } catch (error) {
                songList.innerHTML = `<div class="empty">Błąd ładowania: ${escapeHtml(error.message)}</div>`;
                welcomeScreen.textContent = "Nie udało się załadować bazy utworów.";
            }
        }

        function handleRouting() {
            if (!allSongs.length) return;

            const hash = window.location.hash;
            if (hash && hash.startsWith("#/")) {
                const found = displaySong(decodeURIComponent(hash.slice(2)));
                if (!found) showRandomSong(false);
                if (window.matchMedia("(max-width: 780px)").matches) setSidebarHidden(true);
                return;
            }

            showRandomSong(false);
        }

        function renderAllLists() {
            renderLatestList();
            renderFavoritesList();
            renderSongList(getFilteredSongs());
        }

        function getFilteredSongs() {
            const query = normalize(searchInput.value);
            return allSongs.filter(song => {
                const tags = Array.isArray(song.tags) ? song.tags : [];
                const titleMatch = normalize(song.title).includes(query);
                const tagSearchMatch = tags.some(tag => normalize(tag).includes(query));
                const activeTagMatch = !activeTag || tags.some(tag => normalize(tag) === normalize(activeTag));
                return activeTagMatch && (!query || titleMatch || tagSearchMatch);
            });
        }

        function renderLatestList() {
            const latest = allSongs.slice(-10).reverse();
            latestList.innerHTML = latest.length ? "" : `<div class="empty">Brak utworów</div>`;
            latest.forEach(song => latestList.appendChild(createSongRow(song, true)));
        }

        function renderFavoritesList() {
            const favoriteSongs = favorites
                .map(title => allSongs.find(song => song.title === title))
                .filter(Boolean);

            favoritesList.innerHTML = favoriteSongs.length ? "" : `<div class="empty">Brak ulubionych</div>`;
            favoriteSongs.forEach(song => favoritesList.appendChild(createSongRow(song, true)));
        }

        function renderSongList(songs) {
            songList.innerHTML = "";
            if (!songs.length) {
                songList.innerHTML = `<div class="empty">Brak utworów</div>`;
                return;
            }
            songs.forEach(song => songList.appendChild(createSongRow(song, false)));
        }

        function createSongRow(song, compact) {
            const row = document.createElement("div");
            row.className = "song-row";

            const star = document.createElement("button");
            star.type = "button";
            star.className = "favorite-button" + (isFavorite(song.title) ? " active" : "");
            star.textContent = isFavorite(song.title) ? "★" : "☆";
            star.title = isFavorite(song.title) ? "Usuń z ulubionych" : "Dodaj do ulubionych";
            star.addEventListener("click", event => {
                event.preventDefault();
                toggleFavorite(song.title);
            });

            const link = document.createElement("a");
            link.href = `#/${encodeURIComponent(song.title.trim())}`;
            link.className = "song-link" + (currentSong && currentSong.title === song.title ? " active" : "");
            link.textContent = song.title;
            if (compact) link.style.fontSize = "0.82rem";

            row.appendChild(star);
            row.appendChild(link);
            return row;
        }

        function displaySong(songTitleToFind) {
            const song = allSongs.find(item => item.title.trim() === songTitleToFind.trim());
            if (!song) return false;

            currentSong = song;
            localStorage.setItem(storageKeys.lastSong, song.title);

            welcomeScreen.classList.add("hidden");
            songScreen.classList.remove("hidden");
            songTitle.textContent = song.title;
            renderTags(song);
            renderSongBody(song);
            updateTransposition();
            updateFavoriteCurrent();
            renderAllLists();
            return true;
        }

        function renderTags(song) {
            songTags.innerHTML = "";
            const tags = Array.isArray(song.tags) ? song.tags.filter(Boolean) : [];
            tags.forEach(tag => {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "tag-button" + (normalize(tag) === normalize(activeTag) ? " active" : "");
                button.textContent = tag;
                button.addEventListener("click", () => {
                    activeTag = normalize(tag) === normalize(activeTag) ? "" : tag;
                    searchInput.value = "";
                    renderAllLists();
                    renderTags(song);
                });
                songTags.appendChild(button);
            });
        }

        function renderSongBody(song) {
            songBody.innerHTML = "";
            const lines = Array.isArray(song.lyrics) ? song.lyrics : [];

            lines.forEach(line => {
                const row = document.createElement("div");
                row.className = "song-line";

                const chordSpan = document.createElement("span");
                chordSpan.className = "chords";
                const chords = Array.isArray(line.chords) ? line.chords : [];
                chordSpan.textContent = chords.map(chord => transposeChord(chord, currentTransposition)).join(" ");

                const lyricSpan = document.createElement("span");
                lyricSpan.className = "lyric";
                lyricSpan.textContent = line.text || " ";

                if (chordSpan.textContent) row.appendChild(chordSpan);
                row.appendChild(lyricSpan);
                songBody.appendChild(row);
            });
        }

        function parseRoot(value) {
            const match = String(value || "").trim().match(/^([A-Ha-h])(#|b|is|es|IS|ES)?/);
            if (!match) return null;

            const letter = match[1].toUpperCase();
            const accidental = match[2] || "";
            const normalizedAccidental = accidental === "IS" ? "is" : accidental === "ES" ? "es" : accidental;
            const root = letter + normalizedAccidental;
            const valueIndex = noteValues[root];
            if (valueIndex === undefined) return null;

            return {
                root,
                value: valueIndex,
                length: match[0].length,
                style: getNoteStyle(root),
                lowercase: match[1] === match[1].toLowerCase()
            };
        }

        function getNoteStyle(root) {
            if (root.includes("is") || root.includes("es") || root === "B") return "polish";
            if (root.includes("b")) return "flat";
            return "sharp";
        }

        function noteName(value, style) {
            const normalized = ((value % 12) + 12) % 12;
            if (style === "polish") return polishNames[normalized];
            if (style === "flat") return flatNames[normalized];
            return sharpNames[normalized];
        }

        function transposeChord(chord, steps) {
            if (!chord || steps === 0) return chord;
            const parts = parseChord(chord);
            if (!parts) return chord;

            const nextRoot = formatTransposedNote(parts.root, steps, parts.suffix);
            const nextBass = parts.bass ? "/" + formatTransposedNote(parts.bass, steps, "") : "";
            return nextRoot + parts.suffix + nextBass;
        }

        function formatTransposedNote(root, steps, suffix) {
            const name = noteName(root.value + steps, root.style);
            return root.lowercase && !suffix ? name.toLowerCase() : name;
        }

        function parseChord(chord) {
            const source = String(chord || "").trim();
            const root = parseRoot(source);
            if (!root) return null;

            const rest = source.slice(root.length);
            const slashIndex = rest.indexOf("/");
            const suffix = slashIndex === -1 ? rest : rest.slice(0, slashIndex);
            const bassText = slashIndex === -1 ? "" : rest.slice(slashIndex + 1);

            if (!isChordSuffix(suffix)) return null;
            if (!bassText) return { root, suffix, bass: null };

            const bass = parseRoot(bassText);
            if (!bass || bass.length !== bassText.length) return null;
            return { root, suffix, bass };
        }

        function isChordSuffix(value) {
            return /^(?:m|maj|min|dim|aug|sus|add|[0-9#+\-()°])*$/i.test(value);
        }

        function findFirstChord(song) {
            const lines = Array.isArray(song.lyrics) ? song.lyrics : [];
            for (const line of lines) {
                const chords = Array.isArray(line.chords) ? line.chords : [];
                for (const chord of chords) {
                    const parsed = parseChord(chord);
                    if (parsed) return parsed.root;
                }
            }
            return null;
        }

        function transposeToTarget() {
            if (!currentSong) return;
            const first = findFirstChord(currentSong);
            const target = parseRoot(targetChord.value);
            if (!first || !target) return;

            currentTransposition = normalizeSteps(target.value - first.value);
            saveTransposition();
            renderSongBody(currentSong);
            updateTransposition();
        }

        function changeTransposition(steps) {
            currentTransposition = normalizeSteps(currentTransposition + steps);
            saveTransposition();
            if (currentSong) renderSongBody(currentSong);
            updateTransposition();
        }

        function resetTransposition() {
            currentTransposition = 0;
            saveTransposition();
            if (currentSong) renderSongBody(currentSong);
            updateTransposition();
        }

        function normalizeSteps(value) {
            let normalized = value % 12;
            if (normalized > 6) normalized -= 12;
            if (normalized < -6) normalized += 12;
            return normalized;
        }

        function saveTransposition() {
            localStorage.setItem(storageKeys.transposition, String(currentTransposition));
        }

        function updateTransposition() {
            transpositionVal.textContent = currentTransposition > 0 ? `+${currentTransposition}` : String(currentTransposition);
        }

        function toggleSidebar() {
            setSidebarHidden(!body.classList.contains("sidebar-hidden"));
        }

        function setSidebarHidden(hidden) {
            body.classList.toggle("sidebar-hidden", hidden);
            localStorage.setItem(storageKeys.sidebarHidden, String(hidden));
        }

        function showRandomSong(updateHash = true) {
            if (!allSongs.length) return;
            const song = allSongs[Math.floor(Math.random() * allSongs.length)];
            if (updateHash) {
                window.location.hash = `#/${encodeURIComponent(song.title.trim())}`;
            } else {
                displaySong(song.title);
            }
        }

        function toggleFavorite(title) {
            favorites = isFavorite(title)
                ? favorites.filter(item => item !== title)
                : [...favorites, title];
            localStorage.setItem(storageKeys.favorites, JSON.stringify(favorites));
            updateFavoriteCurrent();
            renderAllLists();
        }

        function isFavorite(title) {
            return favorites.includes(title);
        }

        function updateFavoriteCurrent() {
            if (!currentSong) return;
            const active = isFavorite(currentSong.title);
            favoriteCurrent.classList.toggle("active", active);
            favoriteCurrent.textContent = active ? "★" : "☆";
            favoriteCurrent.title = active ? "Usuń z ulubionych" : "Dodaj do ulubionych";
        }

        function toggleTheme() {
            body.classList.toggle("light");
            localStorage.setItem(storageKeys.theme, body.classList.contains("light") ? "light" : "dark");
            updateThemeButton();
        }

        function updateThemeButton() {
            themeToggle.textContent = body.classList.contains("light") ? "Tryb nocny" : "Tryb dzienny";
        }

        function setScrollSpeed(value) {
            scrollSpeed = Math.max(0, Math.min(9, value));
            localStorage.setItem(storageKeys.scrollSpeed, String(scrollSpeed));
            updateScrollSpeed();
        }

        function updateScrollSpeed() {
            scrollSpeedLabel.textContent = String(scrollSpeed);
            if (scrollSpeed > 0 && !scrollFrame) {
                lastScrollTime = performance.now();
                scrollFrame = requestAnimationFrame(autoScroll);
            }
            if (scrollSpeed === 0 && scrollFrame) {
                cancelAnimationFrame(scrollFrame);
                scrollFrame = null;
            }
        }

        function autoScroll(now) {
            const elapsed = now - lastScrollTime;
            lastScrollTime = now;
            if (scrollSpeed > 0) {
                contentArea.scrollTop += (scrollSpeed * elapsed) / 900;
                scrollFrame = requestAnimationFrame(autoScroll);
            } else {
                scrollFrame = null;
            }
        }

        function readNumber(key, fallback) {
            const value = Number(localStorage.getItem(key));
            return Number.isFinite(value) ? value : fallback;
        }

        function readJson(key, fallback) {
            try {
                const value = JSON.parse(localStorage.getItem(key));
                return Array.isArray(value) ? value : fallback;
            } catch {
                return fallback;
            }
        }

        function normalize(value) {
            return String(value || "").trim().toLowerCase();
        }

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, char => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                "\"": "&quot;",
                "'": "&#039;"
            }[char]));
        }
    </script>
</body>
</html>
